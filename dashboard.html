<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Extella Dashboard — Live Visitors</title><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:"DM Sans",sans-serif;background:#0A0A0A;color:#F0F0F0;min-height:100vh}@keyframes pu{0%,100%{opacity:1}50%{opacity:.2}}@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}@keyframes bl{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}.nd{width:8px;height:8px;border-radius:50%;background:#10b981;animation:pu 1.5s infinite;display:inline-block}.pulse{animation:pu 2s infinite}header{background:#111;border-bottom:1px solid rgba(255,255,255,.08);padding:14px 32px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}.hl{font-size:18px;font-weight:800;letter-spacing:-.5px}.hl span{color:#D4944A}.hr{display:flex;align-items:center;gap:14px;font-size:13px;color:rgba(255,255,255,.4)}#lu{font-size:12px;color:rgba(255,255,255,.25)}.back{color:rgba(255,255,255,.4);text-decoration:none;font-size:13px;border:1px solid rgba(255,255,255,.12);padding:5px 12px;border-radius:100px}.back:hover{color:#fff;border-color:rgba(255,255,255,.3)}.main{max-width:1200px;margin:0 auto;padding:28px 32px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}.stat{background:#161616;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:18px}.sv{font-size:36px;font-weight:900;letter-spacing:-1.5px;color:#D4944A;line-height:1}.sl{font-size:12px;color:rgba(255,255,255,.35);margin-top:4px;text-transform:uppercase;letter-spacing:.06em}.grid{display:grid;grid-template-columns:1fr 340px;gap:16px}.card{background:#111;border:1px solid rgba(255,255,255,.08);border-radius:16px;overflow:hidden}.ch{padding:14px 18px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;justify-content:space-between;align-items:center}.ct{font-size:14px;font-weight:700;color:#F0F0F0}.cc{font-size:12px;color:rgba(255,255,255,.25)}table{width:100%;border-collapse:collapse}th{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:rgba(255,255,255,.3);padding:10px 18px;text-align:left;border-bottom:1px solid rgba(255,255,255,.06)}td{padding:11px 18px;font-size:13px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:top}tr:last-child td{border-bottom:none}tr:hover td{background:rgba(255,255,255,.02)}.tag{display:inline-block;background:rgba(212,148,74,.15);color:#D4944A;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:600;margin:1px}.ev{padding:11px 16px;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;animation:fu .3s ease both}.ev:last-child{border-bottom:none}.et{font-weight:600;color:#F0F0F0}.em{font-size:12px;color:rgba(255,255,255,.35);margin-top:2px}.eb{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;flex-shrink:0}.empty{padding:40px;text-align:center;color:rgba(255,255,255,.2);font-size:14px}.pt{display:inline-block;padding:3px 9px;border-radius:100px;font-size:11px;font-weight:600}.pt-cl{background:rgba(197,126,51,.15);color:#C57E33}.pt-ow{background:rgba(79,142,247,.15);color:#4f8ef7}.pt-dl{background:rgba(182,104,245,.15);color:#b668f5}.pt-bg{background:rgba(52,211,153,.15);color:#34d399}.reg{color:#10b981;font-size:11px;font-weight:600}#et{font-size:11px;color:rgba(255,255,255,.2);padding:4px 12px}</style></head><body><header><div class="hl">Extella <span>Dashboard</span></div><div class="hr"><div class="nd"></div><span>Live · обновление каждые 3 сек</span><span id="lu"></span><a class="back" href="/">← Магазин</a></div></header><div class="main"><div class="stats"><div class="stat"><div class="sv" id="s-total">—</div><div class="sl">Всего посетителей</div></div><div class="stat"><div class="sv" id="s-reg">—</div><div class="sl">Зарегистрировались</div></div><div class="stat"><div class="sv" id="s-ret">—</div><div class="sl">Вернулись (2+ визита)</div></div><div class="stat"><div class="sv" id="s-buy">—</div><div class="sl">Симулировали покупку</div></div></div><div class="grid"><div class="card"><div class="ch"><div class="ct">👥 Посетители</div><div class="cc" id="vc">0 человек</div></div><div id="vt"><div class="empty">Загружаем...</div></div></div><div class="card"><div class="ch"><div class="ct">⚡ Live события</div><div id="et"></div></div><div id="ef" style="max-height:540px;overflow-y:auto"><div class="empty">Ждём событий...</div></div></div></div></div><script>var SB="https://nsjwtywrnlvhnxuflbpg.supabase.co",SBK="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5zand0eXdybmx2aG54dWZsYnBnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NzE0MTUsImV4cCI6MjA5MjQ0NzQxNX0.oijoVbdxD6N1MRwK9G5v1mrOFM9uxvLoXiM10iVqPd0";var SBH={"apikey":SBK,"Authorization":"Bearer "+SBK,"Content-Type":"application/json"};var allEvents=[];var UL={coffee_lover:"☕ Кофеман",office_worker:"💼 Офисный работник",design_lover:"🎨 Любитель дизайна",beginner:"🔰 Новичок"};var PT={coffee_lover:"pt-cl",office_worker:"pt-ow",design_lover:"pt-dl",beginner:"pt-bg"};var EC={page_view:{c:"#3b82f6",l:"Зашёл на страницу"},chat:{c:"#8b5cf6",l:"Вопрос в чат"},register:{c:"#10b981",l:"Зарегистрировался"},purchase:{c:"#f59e0b",l:"Покупка"},scroll:{c:"#6b7280",l:"Прокрутил"},reset:{c:"#ef4444",l:"Сбросил профиль"}};function g(id){return document.getElementById(id)}function rel(ts){var d=new Date(ts),n=new Date(),diff=Math.floor((n-d)/1000);if(diff<60)return diff+"с назад";if(diff<3600)return Math.floor(diff/60)+"м назад";return Math.floor(diff/3600)+"ч назад"}function ptClass(ut){return PT[ut]||"pt-bg"}async function load(){try{var r=await fetch(SB+"/rest/v1/visitors?order=last_seen.desc&limit=100",{headers:SBH});var visitors=await r.json();if(!Array.isArray(visitors))return;var total=visitors.length;var regCount=visitors.filter(function(v){return v.name}).length;var retCount=visitors.filter(function(v){return v.visit_count>1}).length;var buyCount=visitors.filter(function(v){return (v.events||[]).some(function(e){return e.type==="purchase"})}).length;g("s-total").textContent=total;g("s-reg").textContent=regCount;g("s-ret").textContent=retCount;g("s-buy").textContent=buyCount;g("vc").textContent=total+" человек";if(total===0){g("vt").innerHTML="<div class='empty'>Нет посетителей пока</div>";}else{var rows=visitors.map(function(v){var p=v.profile||{};var ut=p.user_type||"beginner";var tags=Object.keys(p.tags||{}).slice(0,3).map(function(t){return "<span class='tag'>"+t+"</span>"}).join("");var vid=v.id?v.id.substring(0,8)+"...":"—";return "<tr>"+"<td><span style='font-size:11px;color:rgba(255,255,255,.25);font-family:monospace'>"+vid+"</span>"+(v.name?"<br><span class='reg'>✓ "+v.name+"</span>":"")+"</td>"+"<td><span class='pt "+ptClass(ut)+"'>"+UL[ut]+"</span></td>"+"<td style='text-align:center;font-weight:700;color:#D4944A'>"+(v.visit_count||1)+"</td>"+"<td>"+(tags||"<span style='color:rgba(255,255,255,.2)'>—</span>")+"</td>"+"<td style='color:rgba(255,255,255,.3);font-size:12px'>"+rel(v.last_seen)+"</td>"+"</tr>"}).join("");g("vt").innerHTML="<table><thead><tr><th>ID / Имя</th><th>Профиль</th><th>Визиты</th><th>Интересы</th><th>Активность</th></tr></thead><tbody>"+rows+"</tbody></table>"}var newEvents=[];visitors.forEach(function(v){var p=v.profile||{};var ut=p.user_type||"beginner";var nm=v.name||v.id.substring(0,8)+"...";(v.events||[]).forEach(function(e){newEvents.push(Object.assign({},e,{visitor_name:nm,user_type:ut,visitor_id:v.id}))});});newEvents.sort(function(a,b){return new Date(b.ts)-new Date(a.ts)});var top=newEvents.slice(0,50);if(top.length===0){g("ef").innerHTML="<div class='empty'>Нет событий пока.<br>Открой магазин и покликай!</div>";}else{g("ef").innerHTML=top.map(function(e){var ec=EC[e.type]||{c:"#888",l:e.type};var detail="";if(e.type==="chat"&&e.q)detail=e.q;if(e.type==="register"&&e.name)detail="→ "+e.name;if(e.type==="purchase"&&e.price)detail=e.price.toLocaleString()+"₽";return "<div class='ev'><div style='display:flex;align-items:center;gap:6px'>"+"<span class='eb' style='background:"+ec.c+"'></span>"+"<span class='et'>"+ec.l+"</span>"+"<span style='color:rgba(255,255,255,.25);font-size:11px'>"+rel(e.ts)+"</span>"+"</div><div class='em'>"+e.visitor_name+" · <span class='pt "+ptClass(e.user_type)+"' style='font-size:10px'>"+UL[e.user_type]+"</span>"+(detail?" · "+detail:"")+"</div></div>"}).join("")}g("et").textContent=top.length+" событий";g("lu").textContent="обновлено "+new Date().toLocaleTimeString("ru-RU");}catch(e){console.error(e)}}load();setInterval(load,3000);</script></body></html>
