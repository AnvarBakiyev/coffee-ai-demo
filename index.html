function sfetch(url,opts,ms){
  return new Promise(function(res,rej){
    var ac=new AbortController();
    var t=setTimeout(function(){ac.abort()},ms||8000);
    fetch(url,Object.assign({},opts||{},{signal:ac.signal}))

function getFP(){
  var ua=navigator.userAgent,h=new Date().getHours(),day=new Date().getDay();
  var os=/Mac/.test(ua)&&!/iPhone|iPad/.test(ua)?"mac":/Win/.test(ua)?"win":/Linux/.test(ua)?"linux":"other";
  var br=/Chrome/.test(ua)&&!/Edge/.test(ua)?"chrome":/Firefox/.test(ua)?"firefox":/Safari/.test(ua)&&!/Chrome/.test(ua)?"safari":"other";
  return{os:os,br:br,mob:/Mobile|Android|iPhone|iPad/.test(ua),sw:screen.width,h:h,day:day,tz:Intl.DateTimeFormat().resolvedOptions().timeZone||"UTC",cores:navigator.hardwareConcurrency||2,dpr:window.devicePixelRatio||1};
}
function detectProfile(fp){
  var s={coffee_lover:0,office_worker:0,design_lover:0,beginner:0};
  if(fp.os==="mac")s.design_lover+=3;
  if(fp.os==="win")s.office_worker+=2;
  if(fp.mob)s.beginner+=4;
  if(fp.sw>=2560)s.design_lover+=3;
  if(fp.h>=7&&fp.h<=9)s.office_worker+=3;
  else if(fp.h>=21||fp.h<=4)s.coffee_lover+=3;
  if(fp.day===0||fp.day===6)s.coffee_lover+=2;
  if(fp.dpr>=2)s.design_lover+=1;
  return Object.entries(s).sort(function(a,b){return b[1]-a[1]})[0][0];
}

async function callAI(prompt){
  try{
    var r=await sfetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{"Authorization":"Bearer "+OAK,"Content-Type":"application/json"},
      body:JSON.stringify({model:"gpt-4o-mini",messages:[{role:"user",content:prompt}],temperature:0.9,response_format:{type:"json_object"}})
    },22000);
    var d=await r.json();
    var c=d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content;
    return c?JSON.parse(c):null;
  }catch(e){console.warn("AI error:",e.message);return null}
}

    async function sendChat(){
      if(chL)return;var q=cin.value.trim();if(!q)return;
      cin.value="";chL=true;if(csnd)csnd.disabled=true;addMsg("u",q);
      try{
        var r=await callAI("Консультант DeLonghi La Specialista Arte 89990руб. История: "+chH.slice(-4).map(function(m){return m.r+": "+m.c}).join("; ")+". Вопрос: "+q+". Ответь 2-3 предложения на русском.");
        var ans=r&&r.answer||r&&r.response||"Хороший вопрос! Эта кофемашина — отличный выбор.";
        chH.push({r:"user",c:q},{r:"assistant",c:ans});addMsg("a",ans);
      }catch(e){addMsg("a","Ошибка: "+e.message)}
      chL=false;if(csnd)csnd.disabled=false;
    }
    if(cin)cin.addEventListener("keydown",function(e){if(e.key==="Enter")sendChat()});
    if(csnd)csnd.addEventListener("click",sendChat);

    clearTimeout(safetyTimer);
    g("lf").style.width="100%";
    await new Promise(function(r){setTimeout(r,600)});
    showApp();

  }catch(e){
    console.error("main() error:",e);
    clearTimeout(safetyTimer);
    ldH("Ошибка: "+e.message+" — загружаем fallback");
    setTimeout(function(){showApp(FALLBACK)},1500);
  }
}

main();
</script>
