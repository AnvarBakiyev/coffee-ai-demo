function setupChat(profile){var chH=[],chL=false;var cb2=g("cb2"),ch=g("ch"),cm=g("cm");if(!cm)return;if(ch)ch.addEventListener("click",function(){if(cb2)cb2.className="cb"+(cb2.className.includes("mini")?"":" mini")});function addMsg(side,text,note){var ce=g("ce");if(ce)ce.style.display="none";var d=document.createElement("div");d.className=side==="u"?"mu":"ma";var b=document.createElement("div");b.className="bb "+(side==="u"?"bbu":"bba");b.textContent=text;d.appendChild(b);if(note){var n=document.createElement("div");n.className="bnote";n.textContent=note;d.appendChild(n)}cm.appendChild(d);cm.scrollTop=cm.scrollHeight}function showSec(id){var el=g("s"+id);if(!el)return;el.classList.remove("h");el.classList.add("j","f");setTimeout(function(){el.classList.remove("j","f")},2500);setTimeout(function(){el.scrollIntoView({behavior:"smooth",block:"start"})},300)}function hideSec(id){var el=g("s"+id);if(!el||el.classList.contains("h"))return;el.style.opacity="0";setTimeout(function(){el.classList.add("h");el.style.opacity=""},400)}function applyTr(tr){if(!tr)return[];var notes=[];if(tr.show&&tr.show.length){tr.show.forEach(function(id){showSec(id)});notes.push("show:"+tr.show.join(","))}if(tr.hide&&tr.hide.length){tr.hide.forEach(function(id){hideSec(id)});notes.push("hide:"+tr.hide.join(","))}if(tr.flash){var fe=g("s"+tr.flash);if(fe){fe.classList.add("f");setTimeout(function(){fe.classList.remove("f")},2500);setTimeout(function(){fe.scrollIntoView({behavior:"smooth",block:"start"})},200)}}if(tr.update_features&&tr.update_features.length){var fgx=g("fg");if(fgx)fgx.innerHTML=tr.update_features.map(function(f){return"<div class='fc'><div class='fe'>"+(f.emoji||"")+"</div><div class='fn'>"+(f.title||"")+"</div><div class='fd'>"+(f.desc||"")+"</div><div class='fb'></div></div>"}).join("");notes.push("features")}return notes}async function sendChat(){if(chL)return;var inp=g("cin");var q=inp?inp.value.trim():"";if(!q)return;if(inp)inp.value="";chL=true;var snd=g("csnd");if(sn
