    +"Верни ТОЛЬКО JSON: {"hero_title":"заголовок","hero_sub":"подзаголовок","hero_angle":"угол подачи","cta_text":"кнопка","features":[{"emoji":"","title":"","desc":""},{"emoji":"","title":"","desc":""},{"emoji":"","title":"","desc":""},{"emoji":"","title":"","desc":""}],"reviews":{"summary":"","cards":[{"author":"","source":"Ozon","rating":5,"text":"","quote":""},{"author":"","source":"Яндекс.Маркет","rating":4,"text":"","quote":""},{"author":"","source":"iRecommend","rating":5,"text":"","quote":""}]},"accessories":[{"name":"","reason":"","price":""},{"name":"","reason":"","price":""},{"name":"","reason":"","price":""}],"care_tip":"","faq":[{"q":"","a":""},{"q":"","a":""},{"q":"","a":""}],"show_sections":[]}";

  function callAI(prompt) {
    return sf("https://api.openai.com/v1/chat/completions",{method:"POST",headers:{"Authorization":"Bearer "+OAK,"Content-Type":"application/json"},body:JSON.stringify({model:"gpt-4o-mini",messages:[{role:"user",content:prompt}],temperature:0.9,response_format:{type:"json_object"}})},25000)
      .then(function(r){return r.json()}).then(function(d){var c=d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content;return c?JSON.parse(c):null}).catch(function(){return null});
  }

  // Fetch template from Extella library — THIS is the CSPL innovation
  // Template is a living expert that can be updated without redeployment
  function fetchTemplate() {
    return sf(ET+"/api/expert/get/coffee_tpl_dark",{headers:{"Content-Type":"application/json","X-Auth-Token":ETK}},10000)
      .then(function(r){return r.json()}).then(function(d){return d.expert_code||d.code||""}).catch(function(){return ""});
  }

  var results = await Promise.all([callAI(designPrompt), callAI(contentPrompt), fetchTemplate()]);
  var designSystem = results[0];
  var content = results[1];
  var templateCode = results[2];

  ldSt(2,"dn",(designSystem&&designSystem.accent)||"готово");

  // Show design preview
  if(designSystem) {
    var dsp=g("dsp"); dsp.style.display="block";
    dsp.innerHTML="Фон: <span class='h'>"+(designSystem.bg||"?")+"</span>  Акцент: <span class='h'>"+(designSystem.accent||"?")+"</span><br>Шрифт: <span class='h'>"+(designSystem.font_hero||"72px")+" w"+(designSystem.font_weight||"900")+"</span>  Радиус: <span class='h'>"+(designSystem.radius||"12px")+"</span>";
  }

  // STEP 3: Template loaded from Extella library
  ldSt(3,"ac","рендерим шаблон...");
  ldH("Шаблон coffee_tpl_dark из библиотеки Extella — cspl=html эксперт");

  if(!templateCode) {
    ldH("Template not found — using fallback");
    templateCode = "<div style='padding:40px;color:#fff;font-family:sans-serif'><h1 id='ht'>"+( content&&content.hero_title||"DeLonghi Arte")+"</h1><div id='fg'></div><div id='ag'></div><div id='rcards'></div><div id='rsumm'></div><div id='fq'></div><div id='ct'></div></div>";
  }

  // Render template with kwargs
  var templateContext = {
    profile_label: LABELS[ut],
    hero_title: "DeLonghi La <span class='a'>Specialista</span>",
    hero_sub: content&&content.hero_sub||"Профессиональный эспрессо у вас дома",
    hero_angle: content&&content.hero_angle||"",
    cta_text: content&&content.cta_text||"Купить"
  };
  var renderedHTML = templateCode.replace(/\{\{(\w+)\}\}/g, function(m,key){ return templateContext[key]||m });

  // Inject into page
  g("app").innerHTML = renderedHTML;
  ldSt(3,"dn","coffee_tpl_dark · "+(templateCode.length/1024).toFixed(1)+"KB");

  // STEP 4: Apply design + fill content
  ldSt(4,"ac","применяем...");
  ldH("CSS переменные + контент в DOM");

  await new Promise(function(r){setTimeout(r,200)});

  if(designSystem) applyDesign(designSystem);
  if(content) fillContent(content);

  // Update nav badge
  var nb=g("nb"); if(nb) nb.textContent=LABELS[ut];

  // Setup chat JS now that elements exist
  try { setupChat(OAK, ut, vis); } catch(e) { console.warn('setupChat error:', e.message); }

  ldSt(4,"dn","готово");
  g("lf").style.width="100%";
  ldH("страница живая — чат меняет её в реальном времени");
  await new Promise(function(r){setTimeout(r,700)});

  g("loader").style.opacity="0";
  setTimeout(function(){g("loader").style.display="none";g("app").style.display="block"},600);
}

// Overall timeout safety
var _mainTimeout = setTimeout(function(){
  g("lh").textContent = "Timeout — проверьте консоль (F12)";
  g("lf").style.width = "100%";
  g("loader").style.opacity = "0";
  setTimeout(function(){
    g("loader").style.display = "none";
    if(g("app")) g("app").style.display = "block";
  }, 500);
}, 45000);

main().then(function(){ clearTimeout(_mainTimeout) }).catch(function(e){
  clearTimeout(_mainTimeout);
  console.error(e);
  g("lh").textContent = "Ошибка: " + e.message;
  // Show app anyway after error
  setTimeout(function(){
    g("loader").style.opacity = "0";
    setTimeout(function(){g("loader").style.display="none";if(g("app"))g("app").style.display="block"},500);
  }, 2000);
});
</script>
</body>
</html>
