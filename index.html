// ── Helpers ─────────────────────────────────────────────────────────
function g(id){return document.getElementById(id)}
function ldSt(n,s,v){var el=g("l"+n);if(el)el.className="li "+s;var lv=g("lv"+n);if(lv&&v)lv.textContent=v;var lf=g("lf");if(lf)lf.style.width=(n*25)+"%"}
function ldH(t){var el=g("lh");if(el)el.textContent=t}
function uid(){return"xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g,function(c){var r=Math.random()*16|0;return(c=="x"?r:(r&3|8)).toString(16)})}
function gc(n){var c=document.cookie.split(";").map(function(x){return x.trim()}).find(function(x){return x.startsWith(n+"=")});return c?c.split("=")[1]:null}
function sc(n,v,d){var e=new Date();e.setTime(e.getTime()+d*864e5);document.cookie=n+"="+v+";expires="+e.toUTCString()+";path=/"}
function sfetch(url,opts,ms){
  return new Promise(function(res,rej){
    var ac=new AbortController();
    var t=setTimeout(function(){ac.abort()},ms||8000);
    fetch(url,Object.assign({},opts||{},{signal:ac.signal}))
      .then(function(r){clearTimeout(t);res(r)})
      .catch(function(e){clearTimeout(t);rej(e)});
  });
}

// ── Fingerprint ──────────────────────────────────────────────────────
function getFP(){
  var ua=navigator.userAgent,h=new Date().getHours(),day=new Date().getDay();
  var os=/Mac/.test(ua)&&!/iPhone|iPad/.test(ua)?"mac":/Win/.test(ua)?"win":/Linux/.test(ua)?"linux":"other";
  var br=/Chrome/.test(ua)&&!/Edge/.test(ua)?"chrome":/Firefox/.test(ua)?"firefox":/Safari/.test(ua)&&!/Chrome/.test(ua)?"safari":"other";
  return{os:os,br:br,mob:/Mobile|Android|iPhone|iPad/.test(ua),sw:screen.width,h:h,day:day,tz:Intl.DateTimeFormat().resolvedOptions().timeZone||"UTC",cores:navigator.hardwareConcurrency||2,dpr:window.devicePixelRatio||1};
}
function detectProfile(fp){
  var s={coffee_lover:0,office_worker:0,design_lover:0,beginner:0};
  if(fp.os==="mac")s.design_lover+=3;if(fp.os==="win")s.office_worker+=2;if(fp.mob)s.beginner+=4;
  if(fp.sw>=2560)s.design_lover+=3;if(fp.dpr>=2)s.design_lover+=1;
  if(fp.h>=7&&fp.h<=9)s.office_worker+=3;else if(fp.h>=21||fp.h<=4)s.coffee_lover+=3;
  if(fp.day===0||fp.day===6)s.coffee_lover+=2;
  return Object.entries(s).sort(function(a,b){return b[1]-a[1]})[0][0];
}
var LABELS={coffee_lover:"Кофеман",office_worker:"Офисный работник",design_lover:"Ценитель дизайна",beginner:"Новичок"};

// ── Design ───────────────────────────────────────────────────────────
function applyDesign(ds){
  if(!ds)return;
  var r=document.documentElement.style;
  if(ds.bg){document.body.style.background=ds.bg;var ap=g("app");if(ap)ap.style.background=ds.bg}
  if(ds.bg2)r.setProperty("--bg2",ds.bg2);
  if(ds.accent){r.setProperty("--ac",ds.accent);var hex=ds.accent.replace("#","");if(hex.length===6)r.setProperty("--ar",parseInt(hex.slice(0,2),16)+","+parseInt(hex.slice(2,4),16)+","+parseInt(hex.slice(4,6),16))}
  if(ds.accentl)r.setProperty("--acl",ds.accentl);
  if(ds.radius){r.setProperty("--r",ds.radius);r.setProperty("--r2",ds.radius)}
  if(ds.text)r.setProperty("--txt",ds.text);
  if(ds.muted)r.setProperty("--mt",ds.muted);
  if(ds.border)r.setProperty("--bd",ds.border);
  if(ds.faint)r.setProperty("--ft",ds.faint);
}

    await new Promise(function(r){setTimeout(r,600)});
    g("loader").style.opacity="0";
    setTimeout(function(){g("loader").style.display="none";g("app").style.display="block"},600);

  }catch(e){
    console.error("main() error:",e);
    clearTimeout(safetyTimer);
    g("loader").style.display="none";g("app").style.display="block";
  }
}
main();
</script>
