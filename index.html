<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CoffeeShop — Персонализация...</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"DM Sans",sans-serif;background:#080808;color:#E8E8E8;min-height:100vh;display:flex;align-items:center;justify-content:center}
@keyframes fade-up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes progress{from{width:0}to{width:100%}}
.wrap{width:100%;max-width:480px;padding:48px 32px;text-align:center}
.icon{font-size:56px;margin-bottom:28px;animation:blink 2s infinite}
.title{font-size:28px;font-weight:900;letter-spacing:-1px;margin-bottom:8px;color:#fff}
.sub{font-size:14px;color:rgba(255,255,255,.35);margin-bottom:40px;font-weight:300}
.steps{display:flex;flex-direction:column;gap:12px;margin-bottom:40px;text-align:left}
.step{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);font-size:13px;color:rgba(255,255,255,.4);transition:all .4s}
.step.active{background:rgba(197,126,51,.08);border-color:rgba(197,126,51,.2);color:#C57E33}
.step.done{background:rgba(16,185,129,.06);border-color:rgba(16,185,129,.15);color:rgba(16,185,129,.8)}
.step-icon{font-size:16px;flex-shrink:0;width:20px;text-align:center}
.step-text{flex:1}
.step-status{font-family:"DM Mono",monospace;font-size:10px;opacity:.6}
.bar{height:2px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;margin-bottom:16px}
.bar-fill{height:100%;background:linear-gradient(90deg,#C57E33,#d4984f);border-radius:2px;width:0;transition:width .6s ease}
.hint{font-size:11px;color:rgba(255,255,255,.2);font-family:"DM Mono",monospace;letter-spacing:.05em}
.profile-detected{margin-top:20px;padding:12px 20px;border-radius:8px;background:rgba(197,126,51,.1);border:1px solid rgba(197,126,51,.2);font-size:13px;color:#C57E33;display:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">☕</div>
  <div class="title">Собираем ваш сайт</div>
  <div class="sub">Каждый видит свою версию — создаём прямо сейчас</div>
  <div class="steps">
    <div class="step" id="s1"><div class="step-icon">🔍</div><div class="step-text">Определяем ваш профиль</div><div class="step-status" id="s1s">...</div></div>
    <div class="step" id="s2"><div class="step-icon">🧠</div><div class="step-text">ИИ генерирует контент под вас</div><div class="step-status" id="s2s">ожидание</div></div>
    <div class="step" id="s3"><div class="step-icon">🎨</div><div class="step-text">Собираем страницу из компонентов</div><div class="step-status" id="s3s">ожидание</div></div>
    <div class="step" id="s4"><div class="step-icon">✨</div><div class="step-text">Ваш персональный сайт готов</div><div class="step-status" id="s4s">ожидание</div></div>
  </div>
  <div class="bar"><div class="bar-fill" id="bar"></div></div>
  <div class="hint" id="hint">coffee-ai-demo.vercel.app</div>
  <div class="profile-detected" id="pdet"></div>
</div>
<script>
var SB="https://nsjwtywrnlvhnxuflbpg.supabase.co",SBK="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5zand0eXdybmx2aG54dWZsYnBnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NzE0MTUsImV4cCI6MjA5MjQ0NzQxNX0.oijoVbdxD6N1MRwK9G5v1mrOFM9uxvLoXiM10iVqPd0",ET="https://api.extella.ai",ETK="f105e093-effc-42d6-973c-39401ab77445";
var SBH={"apikey":SBK,"Authorization":"Bearer "+SBK,"Content-Type":"application/json"};
var OAK="";

function g(id){return document.getElementById(id)}
function setStep(n,status,text){
  var s=g("s"+n);var st=g("s"+n+"s");
  s.className="step "+(status==="active"?"active":status==="done"?"done":"");
  if(st)st.textContent=text||"";
  g("bar").style.width=(n*25)+"%";
}
function sf(url,opts,ms){return new Promise(function(res,rej){var ac=new AbortController();var t=setTimeout(function(){ac.abort()},ms||5000);fetch(url,Object.assign({},opts||{},{signal:ac.signal})).then(function(r){clearTimeout(t);res(r)}).catch(function(e){clearTimeout(t);rej(e)})})}
function sbI(d){sf(SB+"/rest/v1/visitors",{method:"POST",headers:Object.assign({},SBH,{"Prefer":"return=minimal"}),body:JSON.stringify(d)},5000).catch(function(){})}
function sbL(id){return sf(SB+"/rest/v1/visitors?id=eq."+id+"&limit=1",{headers:SBH},5000).then(function(r){return r.json()}).then(function(d){return Array.isArray(d)&&d.length?d[0]:null}).catch(function(){return null})}
function sbU(id,d){sf(SB+"/rest/v1/visitors?id=eq."+id,{method:"PATCH",headers:Object.assign({},SBH,{"Prefer":"return=minimal"}),body:JSON.stringify(d)},5000).catch(function(){})}
function gc(n){var c=document.cookie.split(";").map(function(x){return x.trim()}).find(function(x){return x.startsWith(n+"=")});return c?c.split("=")[1]:null}
function sc(n,v,d){var e=new Date();e.setTime(e.getTime()+d*864e5);document.cookie=n+"="+v+";expires="+e.toUTCString()+";path=/;SameSite=Lax"}
function uid(){return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g,function(c){var r=Math.random()*16|0;return(c==="x"?r:(r&3|8)).toString(16)})}
function fp(){var ua=navigator.userAgent,h=new Date().getHours();return{os:/Mac/.test(ua)&&!/iPhone|iPad/.test(ua)?"mac":/Win/.test(ua)?"win":"other",mob:/Mobile|Android|iPhone/.test(ua),sw:screen.width,h:h}}
function dp(f){
  var s={coffee_lover:0,office_worker:0,design_lover:0,beginner:0};
  if(f.os==="mac")s.design_lover+=3;
  if(f.mob)s.beginner+=3;
  if(f.os==="win")s.office_worker+=2;
  if(f.sw>=1920)s.design_lover+=2;
  if(f.h>=7&&f.h<=9)s.office_worker+=3;
  else if(f.h>=21||f.h<=4)s.coffee_lover+=2;
  var t=Object.entries(s).sort(function(a,b){return b[1]-a[1]});
  return t[0][0];
}
var LABELS={coffee_lover:"Кофеман ☕",office_worker:"Офисный работник 💼",design_lover:"Любитель дизайна 🎨",beginner:"Новичок 🔰"};

async function main(){
  // Step 1: detect profile
  setStep(1,"active","определяем...");
  var f=fp();
  var ut=dp(f);
  await new Promise(function(r){setTimeout(r,600)});
  setStep(1,"done",LABELS[ut]);
  g("pdet").style.display="block";
  g("pdet").textContent="Ваш профиль: "+LABELS[ut]+" · "+f.os.toUpperCase()+" · "+f.sw+"px";

  // Load OpenAI key from Supabase config
  try{
    var kr=await sf(SB+"/rest/v1/config?key=eq.openai_api_key&select=value",{headers:SBH},5000);
    var kd=await kr.json();
    OAK=(Array.isArray(kd)&&kd.length)?kd[0].value:"";
  }catch(e){console.warn("key error",e)}

  // Supabase visitor tracking
  var vid=gc("vid");
  if(!vid){vid=uid();sc("vid",vid,365)}
  var vis=await sbL(vid);
  var vc=1;
  if(vis){vc=(vis.visit_count||1)+1;sbU(vid,{visit_count:vc,last_seen:new Date().toISOString()})}
  else{sbI({id:vid,fingerprint:f,profile:{user_type:ut,tags:{},price_segment:"budget"},events:[{type:"page_view",ts:new Date().toISOString()}],visit_count:1,created_at:new Date().toISOString(),last_seen:new Date().toISOString()})}

  // Step 2: call coffee_build_page expert
  setStep(2,"active","генерируем...");
  g("hint").textContent="GPT-4o-mini создаёт контент под ваш профиль";

  var params={
    user_type:ut,
    visit_count:String(vc),
    visitor_name:(vis&&vis.name)||"",
    has_purchased:((vis&&vis.events||[]).some(function(e){return e.type==="purchase"}))?"true":"false",
    openai_key:OAK,
    api_token:ETK
  };

  var pageHTML=null;
  try{
    var r=await sf(ET+"/api/expert/run",{
      method:"POST",
      headers:{"Content-Type":"application/json","X-Auth-Token":ETK},
      body:JSON.stringify({expert_name:"coffee_build_page",params:params})
    },60000);
    var d=await r.json();
    var result=d.result||d;
    if(result&&result.html){
      pageHTML=result.html;
      setStep(2,"done","готово");
    }else{
      setStep(2,"done","error: "+JSON.stringify(result).substring(0,80));
    }
  }catch(e){
    setStep(2,"done","error: "+e.message);
    g("hint").textContent="Ошибка генерации: "+e.message;
    return;
  }

  // Step 3: assemble
  setStep(3,"active","собираем...");
  g("hint").textContent="Рендерим вашу уникальную страницу";
  await new Promise(function(r){setTimeout(r,400)});
  setStep(3,"done","собрано");

  // Step 4: inject
  setStep(4,"active","готово!");
  g("bar").style.width="100%";
  await new Promise(function(r){setTimeout(r,300)});

  // Replace entire page with generated HTML
  document.open();
  document.write(pageHTML);
  document.close();
}

main().catch(function(e){
  console.error(e);
  g("hint").textContent="Ошибка: "+e.message;
});
</script>
</body>
</html>
