.an{font-size:14px;font-weight:700;color:var(--txt-h)}
.ar2{font-size:13px;color:var(--mt);line-height:1.5}
.acc-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:12px}

.cart-head{padding:20px 24px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}

.mu,.ma{display:flex}.mu{justify-content:flex-end}
